worker_processes auto;

events {
    worker_connections 2048;
}

http {
    # Use Docker's embedded DNS (127.0.0.11) so upstreams resolve at request time
    # instead of being cached at config-load. Without this, nginx fails to start
    # if `server` or `client` aren't yet DNS-resolvable, and never picks up new
    # IPs after container restarts.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Rate limiting zone: 10 requests/second per IP, 10MB shared memory
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Security headers applied to all responses
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Upload size — must match server's UPLOAD_MAX_SIZE (default 5MB)
    client_max_body_size 6m;

    server {
        listen 80;

        # Variable-based proxy_pass forces nginx to resolve the upstream at
        # request time using the `resolver` directive above. Plain
        # `proxy_pass http://server` would re-cache the IP at config load,
        # which defeats the purpose.
        location /api {
            limit_req zone=api_limit burst=20 nodelay;

            set $upstream_api "server:3001";
            proxy_pass http://$upstream_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        location /socket.io {
            set $upstream_ws "server:3001";
            proxy_pass http://$upstream_ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            set $upstream_client "client:5173";
            proxy_pass http://$upstream_client;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
