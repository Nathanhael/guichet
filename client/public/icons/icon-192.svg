<svg width="192" height="192" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" fill="#09090b"/>
  
  <!-- Icon: Geometric square tile with grid lines -->
  <g transform="translate(96, 64)">
    <!-- Main blue square -->
    <rect width="320" height="320" fill="#3b82f6"/>
    
    <!-- Grid lines (using background color) -->
    <!-- Horizontal lines -->
    <rect x="0" y="78" width="320" height="4" fill="#09090b"/>
    <rect x="0" y="158" width="320" height="4" fill="#09090b"/>
    <rect x="0" y="238" width="320" height="4" fill="#09090b"/>
    
    <!-- Vertical lines -->
    <rect x="78" y="0" width="4" height="320" fill="#09090b"/>
    <rect x="158" y="0" width="4" height="320" fill="#09090b"/>
    <rect x="238" y="0" width="4" height="320" fill="#09090b"/>
  </g>
  
  <!-- Wordmark -->
  <text 
    x="256" y="460" 
    text-anchor="middle" 
    fill="#3b82f6" 
    font-family="'JetBrains Mono', 'Courier New', monospace" 
    font-size="64" 
    font-weight="700"
    letter-spacing="12"
  >TESSERA</text>
</svg>
