name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json
      - name: Install server dependencies
        run: cd server && npm ci
      - name: Install client dependencies
        run: cd client && npm ci
      - name: Typecheck server
        run: cd server && npx tsc --noEmit
      - name: Typecheck client
        run: cd client && npx tsc --noEmit

  test-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install client dependencies
        run: cd client && npm ci
      - name: Run client tests
        run: cd client && npm test

  test-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install server dependencies
        run: cd server && npm ci
      - name: Run server tests
        run: cd server && npm test

  migrate-check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: tessera_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install server dependencies
        run: cd server && npm ci
      - name: Run migrations against fresh DB
        run: cd server && npm run db:migrate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/tessera_ci

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: tessera_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            client/package-lock.json
      - name: Install root dependencies
        run: npm ci
      - name: Install server dependencies
        run: cd server && npm ci
      - name: Install client dependencies
        run: cd client && npm ci
      - name: Run migrations
        run: cd server && npm run db:migrate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/tessera_e2e
      - name: Seed E2E database
        run: cd server && npx tsx scripts/seed_e2e.ts
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/tessera_e2e
          JWT_SECRET: ci-test-secret-that-is-at-least-32-chars
          PLATFORM_ADMIN_EMAIL: alice@acme.com
          PLATFORM_ADMIN_PASSWORD: password123
          NODE_ENV: test
      - name: Build client
        run: cd client && npm run build
      - name: Start server
        run: cd server && npx tsx index.ts > /tmp/server.log 2>&1 &
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/tessera_e2e
          JWT_SECRET: ci-test-secret-that-is-at-least-32-chars
          PLATFORM_ADMIN_EMAIL: alice@acme.com
          PLATFORM_ADMIN_PASSWORD: password123
          NODE_ENV: test
      - name: Wait for server
        run: |
          for i in $(seq 1 60); do
            curl -s http://localhost:3001/api/v1/health > /dev/null 2>&1 && exit 0
            sleep 1
          done
          echo "=== Server failed to start within 60s. Server logs: ==="
          cat /tmp/server.log
          exit 1
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        run: npx playwright test
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/tessera_e2e
          E2E_BASE_URL: http://localhost:3001
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
      - name: Upload server log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-log
          path: /tmp/server.log

  build:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test-client, test-server, migrate-check, e2e]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json
      - name: Install server dependencies
        run: cd server && npm ci
      - name: Install client dependencies
        run: cd client && npm ci
      - name: Build client
        run: cd client && npm run build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: client/dist
