# Default log driver config — caps json-file growth so a chatty service
# can't fill the host disk. Azure Container Apps ignores this and routes
# stdout to Log Analytics directly; the cap only matters for the local
# docker-compose prod stack.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: postgres:18-alpine
    restart: always
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-guichet}
      # Postgres 18 alpine image defaults PGDATA to /var/lib/postgresql/18/docker
      # which lives in the container layer, not our mounted volume. Pin PGDATA
      # into a subdirectory of the volume mount so data actually persists.
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-guichet}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    restart: always
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-guichet}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN:-https://${DOMAIN:-localhost}}
      - FRONTEND_URL=${FRONTEND_URL:-https://${DOMAIN:-localhost}}
      - COOKIE_SECURE=true
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-}
      # SECURITY: Redis uses plaintext connection. This is acceptable only when
      # server and redis share a private Docker network (no cross-host traffic).
      # For multi-host deployments, use rediss:// (TLS) and configure Redis with TLS certs.
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - AI_ENABLED=${AI_ENABLED:-false}
      - AI_PROVIDER=${AI_PROVIDER:-azure}
      - AI_TIMEOUT_MS=${AI_TIMEOUT_MS:-60000}
      - AI_BASE_URL=${AI_BASE_URL:-}
      - AI_API_KEY=${AI_API_KEY:-}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT:-}
      # Field encryption key — REQUIRED when AI_ENABLED=true (server FATALs at boot).
      # encryption.ts reads FIELD_ENCRYPTION_SECRET preferentially; AI_KEY_ENCRYPTION_SECRET
      # is kept as a legacy alias and one of the two must be set.
      # Generate with: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      - "FIELD_ENCRYPTION_SECRET=${FIELD_ENCRYPTION_SECRET:?must be set in .env (see docs/AZURE_DEPLOYMENT.md)}"
      - AI_KEY_ENCRYPTION_SECRET=${AI_KEY_ENCRYPTION_SECRET:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/v1/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:8-alpine
    restart: always
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1.0'
        reservations:
          memory: 256M
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=${REDIS_PASSWORD} redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  client:
    build:
      context: .
      dockerfile: client/Dockerfile.prod
    restart: always
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1.0'
        reservations:
          memory: 256M
    depends_on:
      - server

  caddy:
    image: caddy:2-alpine
    restart: always
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
        reservations:
          memory: 64M
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server
      - client
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  caddy_data:
  caddy_config:
