services:
  db:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: guichet
      # Postgres 18 alpine image defaults PGDATA to /var/lib/postgresql/18/docker
      # which lives in the container layer, not our mounted volume. Pin PGDATA
      # into a subdirectory of the volume mount so data actually persists.
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d guichet"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/guichet
      - REDIS_URL=redis://:devpassword@redis:6379
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env}
      - DISABLE_RATE_LIMIT=${DISABLE_RATE_LIMIT:-false}
      - NODE_ENV=development
      - DEBUG=socket.io:*
      - CORS_ORIGIN=http://localhost:5173,http://client:5173,http://localhost:3001,http://lb:80
      - COOKIE_SECURE=false
      - DEMO_MODE=${DEMO_MODE:-false}
      - REQUIRE_PLATFORM_STEP_UP=${REQUIRE_PLATFORM_STEP_UP:-false}
      - PLATFORM_ADMIN_EMAIL=${PLATFORM_ADMIN_EMAIL:-}
      - PLATFORM_ADMIN_PASSWORD=${PLATFORM_ADMIN_PASSWORD:-}
      - AI_ENABLED=${AI_ENABLED:-false}
      # Field encryption key loaded from .env — DO NOT hardcode.
      # FIELD_ENCRYPTION_SECRET is the canonical name; AI_KEY_ENCRYPTION_SECRET is a legacy alias.
      # encryption.ts reads `FIELD_ENCRYPTION_SECRET || AI_KEY_ENCRYPTION_SECRET` so either works.
      - FIELD_ENCRYPTION_SECRET=${FIELD_ENCRYPTION_SECRET:-}
      - AI_KEY_ENCRYPTION_SECRET=${AI_KEY_ENCRYPTION_SECRET:?AI_KEY_ENCRYPTION_SECRET or FIELD_ENCRYPTION_SECRET must be set in .env}
      # METRICS_TOKEN — shared secret between /metrics and Prometheus scraper.
      # Dev default matches the value in monitoring/prometheus.yml so scraping works out of the box.
      - METRICS_TOKEN=${METRICS_TOKEN:-dev-only-metrics-token-replace-in-prod}
      - AI_PROVIDER=${AI_PROVIDER:-ollama}
      - AI_TIMEOUT_MS=${AI_TIMEOUT_MS:-60000}
      - OLLAMA_KEEPALIVE=${OLLAMA_KEEPALIVE:-30m}
      - RECLAIM_TIMEOUT_MINS=${RECLAIM_TIMEOUT_MINS:-30}
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  lb:
    image: nginx:alpine
    restart: always
    ports:
      - "3001:80"
    volumes:
      - ./testing/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      server:
        condition: service_healthy

  redis:
    image: redis:8-alpine
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    command: ["redis-server", "--requirepass", "devpassword"]
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=devpassword redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  client:
    build: ./client
    environment:
      - VITE_API_TARGET=http://server:3001
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
      # Required: client TS imports AppRouter type from /server/trpc/router.
      # If tsc --noEmit fails with 100+ collision errors, recreate: docker compose up -d client --force-recreate
      - ./server:/server:ro
    depends_on:
      server:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      server:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set in .env}
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  server_node_modules:
  client_node_modules:
