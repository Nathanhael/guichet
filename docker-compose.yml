services:
  db:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: guichet
      # Postgres 18 alpine image defaults PGDATA to /var/lib/postgresql/18/docker
      # which lives in the container layer, not our mounted volume. Pin PGDATA
      # into a subdirectory of the volume mount so data actually persists.
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d guichet"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/guichet
      - REDIS_URL=redis://:devpassword@redis:6379
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env}
      - DISABLE_RATE_LIMIT=${DISABLE_RATE_LIMIT:-false}
      - NODE_ENV=development
      - DEBUG=socket.io:*
      - CORS_ORIGIN=http://localhost:5173,http://client:5173,http://localhost:3001,http://lb:80
      - COOKIE_SECURE=false
      - DEMO_MODE=${DEMO_MODE:-false}
      - REQUIRE_PLATFORM_STEP_UP=${REQUIRE_PLATFORM_STEP_UP:-false}
      - PLATFORM_ADMIN_EMAIL=${PLATFORM_ADMIN_EMAIL:-}
      - AI_ENABLED=${AI_ENABLED:-false}
      # Field encryption key loaded from .env — DO NOT hardcode.
      # FIELD_ENCRYPTION_SECRET is the canonical name; AI_KEY_ENCRYPTION_SECRET is a legacy alias.
      # encryption.ts reads `FIELD_ENCRYPTION_SECRET || AI_KEY_ENCRYPTION_SECRET` so either works.
      - FIELD_ENCRYPTION_SECRET=${FIELD_ENCRYPTION_SECRET:?FIELD_ENCRYPTION_SECRET must be set in .env}
      - AI_KEY_ENCRYPTION_SECRET=${AI_KEY_ENCRYPTION_SECRET:-}
      - AI_PROVIDER=${AI_PROVIDER:-azure}
      - AI_TIMEOUT_MS=${AI_TIMEOUT_MS:-60000}
      - AI_BASE_URL=${AI_BASE_URL:-}
      - AI_API_KEY=${AI_API_KEY:-}
      - AZURE_OPENAI_DEPLOYMENT=${AZURE_OPENAI_DEPLOYMENT:-}
      - AZURE_OPENAI_WHISPER_DEPLOYMENT=${AZURE_OPENAI_WHISPER_DEPLOYMENT:-}
      - RECLAIM_TIMEOUT_MINS=${RECLAIM_TIMEOUT_MINS:-30}
      - AZURE_AD_TENANT_ID=${AZURE_AD_TENANT_ID:-}
      - AZURE_AD_CLIENT_ID=${AZURE_AD_CLIENT_ID:-}
      - AZURE_AD_CLIENT_SECRET=${AZURE_AD_CLIENT_SECRET:-}
      - AZURE_AD_REDIRECT_URI=${AZURE_AD_REDIRECT_URI:-}
      - INTERNAL_EMAIL_DOMAINS=${INTERNAL_EMAIL_DOMAINS:-}
      # Docker bridge has no IPv6 route; Microsoft endpoints have AAAA records.
      # Force Node DNS resolver to prefer IPv4 so SSO/JWKS fetches don't ENETUNREACH.
      - NODE_OPTIONS=--dns-result-order=ipv4first
    sysctls:
      # Disable IPv6 inside the container so the resolver returns only A records.
      # NODE_OPTIONS=--dns-result-order=ipv4first alone is not enough: Node's
      # fetch (undici) does not honor it for the connect path on Node 24.
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  lb:
    image: nginx:alpine
    restart: always
    ports:
      - "3001:80"
    volumes:
      - ./testing/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      server:
        condition: service_healthy
      client:
        condition: service_healthy

  redis:
    image: redis:8-alpine
    restart: always
    # No host port binding: internal network only, avoids conflicts with
    # other projects' redis containers. Use `docker compose exec redis redis-cli` for debugging.
    command: ["redis-server", "--requirepass", "devpassword"]
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=devpassword redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  client:
    build: ./client
    environment:
      - VITE_API_TARGET=http://server:3001
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
      # Required: client TS imports AppRouter type from /server/trpc/router.
      # router.ts pulls in db/, services/, utils/ transitively, so client tsc
      # needs server's node_modules to resolve pg/drizzle/pino/etc. Without
      # this mount, tsc fails with 800+ collision errors because AppRouter
      # type degrades when its dep chain can't resolve.
      - ./server:/server:ro
      - server_node_modules:/server/node_modules:ro
    depends_on:
      server:
        condition: service_healthy
    # Vite dev server takes a while to spin up on cold start (deps + first
    # transform). start_period gives it room before failed probes count.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
  server_node_modules:
  client_node_modules:
