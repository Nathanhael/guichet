services:
  server:
    build: ./server
    ports:
      - "3001:3001"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    volumes:
      - ./server:/app
      - /app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"

  client:
    build: ./client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_TARGET=http://server:3001
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - server
