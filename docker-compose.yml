services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tessera
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d tessera"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    # Port 3001 removed from host to support --scale server=N
    # It will be exposed via the 'lb' service on port 80
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - DATABASE_URL=postgres://user:password@db:5432/tessera
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=dev-secret-key-change-in-prod
      - DISABLE_RATE_LIMIT=true
      - AI_ENABLED=false
      - NODE_ENV=test
      - DEBUG=socket.io:*
      - CORS_ORIGIN=http://localhost:5173,http://client:5173,http://localhost:3001,http://lb:80
    volumes:
      - ./server:/app
      - /app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  lb:
    image: nginx:alpine
    restart: always
    ports:
      - "3001:80"
    volumes:
      - ./testing/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server

  k6:
    image: grafana/k6:latest
    volumes:
      - ./testing/k6:/scripts
    environment:
      - SERVER_URL=ws://lb:80
    depends_on:
      - lb

  e2e:
    build: ./e2e
    environment:
      - API_URL=http://lb:80
      - APP_URL=http://client:5173
      - JWT_SECRET=dev-secret-key-change-in-prod
      - NODE_ENV=test
    volumes:
      - ./e2e:/app
      - /app/node_modules
    depends_on:
      - client
      - lb
    profiles:
      - test

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  client:
    build: ./client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_TARGET=http://server:3001
    volumes:
      - ./client:/app
      - /app/node_modules
      - ./server:/server:ro
    depends_on:
      - server

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - server

  grafana:
    image: grafana/grafana:latest
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
