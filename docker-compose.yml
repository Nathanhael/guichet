services:
  db:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tessera
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d tessera"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/tessera
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=dev-secret-key-change-in-prod-minimum-32-chars
      - DISABLE_RATE_LIMIT=true
      - NODE_ENV=development
      - DEBUG=socket.io:*
      - CORS_ORIGIN=http://localhost:5173,http://client:5173,http://localhost:3001,http://lb:80
      - DEMO_MODE=${DEMO_MODE:-false}
      - REQUIRE_PLATFORM_STEP_UP=${REQUIRE_PLATFORM_STEP_UP:-false}
      - PLATFORM_ADMIN_EMAIL=${PLATFORM_ADMIN_EMAIL:-}
      - PLATFORM_ADMIN_PASSWORD=${PLATFORM_ADMIN_PASSWORD:-}
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  lb:
    image: nginx:alpine
    restart: always
    ports:
      - "3001:80"
    volumes:
      - ./testing/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server

  redis:
    image: redis:8-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  client:
    build: ./client
    environment:
      - VITE_API_TARGET=http://server:3001
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
      - ./server:/server:ro
    depends_on:
      - server

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - server

  grafana:
    image: grafana/grafana:latest
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  server_node_modules:
  client_node_modules:
