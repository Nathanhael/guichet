# =============================================================================
# Alertmanager config
# =============================================================================
# Until a real receiver URL is wired in, alerts fire but delivery fails
# (logged by alertmanager, not crashed). Set `ALERTMANAGER_WEBHOOK_URL` in
# `.env` once you have a generic webhook endpoint (ntfy.sh, pipedream, or
# a custom ops service). The four receivers below all fall back to that
# single URL — split them out later when different destinations are needed.
# =============================================================================

global:
  resolve_timeout: 5m

# Routes fan out to named receivers. `continue: true` on a leaf means its
# siblings can also match — useful for tee'ing a critical alert to multiple
# destinations without duplicating the rule in prometheus.
route:
  receiver: default
  group_by: ['alertname', 'subsystem']
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 4h
  routes:
    # Audit-chain tampers are compliance incidents. Always page AND tee to a
    # compliance receiver so it's preserved alongside ops alerts.
    - matchers:
        - subsystem="audit"
        - severity="critical"
      receiver: audit-critical
      group_wait: 0s
      repeat_interval: 30m
      continue: true

    # Warning-level audit: service errors (db timeout during verify, etc).
    - matchers:
        - subsystem="audit"
        - severity="warning"
      receiver: oncall

    # Webhook delivery failures are partner-integration issues.
    - matchers:
        - subsystem="webhooks"
      receiver: integrations

# All receivers post full alert JSON to a generic HTTP endpoint. Each has an
# optional dedicated env var so they can diverge later without touching this
# file; all fall back to `ALERTMANAGER_WEBHOOK_URL` when unset.
receivers:
  - name: default
    webhook_configs:
      - url: ${ALERTMANAGER_DEFAULT_WEBHOOK_URL:-${ALERTMANAGER_WEBHOOK_URL:-http://localhost:9999/alerts/default}}
        send_resolved: true

  - name: audit-critical
    webhook_configs:
      - url: ${ALERTMANAGER_AUDIT_WEBHOOK_URL:-${ALERTMANAGER_WEBHOOK_URL:-http://localhost:9999/alerts/audit-critical}}
        send_resolved: true

  - name: oncall
    webhook_configs:
      - url: ${ALERTMANAGER_ONCALL_WEBHOOK_URL:-${ALERTMANAGER_WEBHOOK_URL:-http://localhost:9999/alerts/oncall}}
        send_resolved: true

  - name: integrations
    webhook_configs:
      - url: ${ALERTMANAGER_INTEGRATIONS_WEBHOOK_URL:-${ALERTMANAGER_WEBHOOK_URL:-http://localhost:9999/alerts/integrations}}
        send_resolved: true

# When the chain is broken at `critical`, don't also page on the `warn`
# service-error rule for the same subsystem — the critical signal supersedes.
inhibit_rules:
  - source_matchers:
      - subsystem="audit"
      - severity="critical"
    target_matchers:
      - subsystem="audit"
      - severity="warning"
    equal: ['subsystem']
