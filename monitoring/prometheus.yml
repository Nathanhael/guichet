global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - '/etc/prometheus/alerts.yml'

# Route fired alerts to Alertmanager for fanout / grouping / silencing.
# The Alertmanager container in docker-compose listens on alertmanager:9093.
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'guichet-server'
    static_configs:
      - targets: ['server:3001']
    metrics_path: '/metrics'
    # The /metrics endpoint requires either X-Metrics-Token (custom) or
    # Authorization: Bearer (native). Prometheus scrape_configs can only emit
    # the latter. Value must match METRICS_TOKEN env in the server service.
    # Dev default is hardcoded — rotate in prod by replacing both sides.
    authorization:
      type: Bearer
      credentials: dev-only-metrics-token-replace-in-prod

  # Alertmanager exposes its own metrics; scraping them lets us alert on
  # alerting (queue depth, notification failures) — without this a Slack
  # outage can silently swallow pages.
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']
